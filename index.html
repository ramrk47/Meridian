<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Meridian — Cross-platform exam almanac</title>
<meta name="description" content="Neutral cross-platform tracker for NEET PG / INI-CET / FMGE — Marrow, Cerebellum, DocTutorials in one place.">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/charts.css">
<link rel="stylesheet" href="css/subject.css">
<link rel="stylesheet" href="css/platform.css">
<link rel="stylesheet" href="css/faculty.css">
<link rel="stylesheet" href="css/overview.css">
<link rel="stylesheet" href="css/qbank.css">
<link rel="stylesheet" href="css/progress.css">
<link rel="stylesheet" href="css/tests.css">
<link rel="stylesheet" href="css/hy.css">
<link rel="stylesheet" href="css/videos.css">
<link rel="stylesheet" href="css/planner.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#181513" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Meridian">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>
<a class="skip" href="#app">Skip to content</a>
<header class="topbar">
  <div class="brand">
    <button class="logo" id="btnHome" aria-label="Overview (home)" title="Overview — home">M</button>
    <div class="brandtxt">
      <h1>Meridian</h1>
      <p class="sub" id="subhead">Cross-platform exam almanac</p>
    </div>
    <span class="mob-title" id="mobTitle" aria-hidden="true">Overview</span>
    <div class="toolbar">
      <button class="tbtn key" id="btnSearch" title="Universal search (⌘K / Ctrl-K)"><span>⌘K</span> Search</button>
      <button class="tbtn" id="btnTheme" title="Day / evening edition">☀ Day</button>
      <button class="tbtn" id="btnExport" title="Download your tracking as JSON">⤓ Export</button>
      <button class="tbtn" id="btnImport" title="Load tracking from a JSON backup">⤒ Import</button>
      <button class="tbtn danger" id="btnReset" title="Clear your tracking">⟲ Reset</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
    <!-- compact mobile actions (≤640px) -->
    <button class="iconbtn mob-only" id="btnSearchM" aria-label="Search (⌘K)" title="Search">⌘K</button>
    <div class="overflow mob-only">
      <button class="iconbtn" id="btnOverflow" aria-label="More actions" aria-expanded="false" aria-haspopup="true" title="More">⋯</button>
      <div class="overflow-menu" id="overflowMenu" role="menu" hidden>
        <button role="menuitem" data-proxy="btnTheme" id="ovTheme">☀ Theme</button>
        <button role="menuitem" data-proxy="btnExport">⤓ Export</button>
        <button role="menuitem" data-proxy="btnImport">⤒ Import</button>
        <button role="menuitem" data-proxy="btnReset" class="danger">⟲ Reset</button>
      </div>
    </div>
  </div>
  <nav class="tabs" id="tabs" role="tablist" aria-label="Sections">
    <button class="tab" role="tab" aria-selected="false" data-view="qbank">QBank Tracker</button>
    <button class="tab" role="tab" aria-selected="false" data-view="progress">Progress</button>
    <button class="tab" role="tab" aria-selected="false" data-view="tests">Tests &amp; Scores</button>
    <button class="tab" role="tab" aria-selected="false" data-view="hy">High-Yield</button>
    <button class="tab" role="tab" aria-selected="false" data-view="videos">Videos</button>
    <button class="tab" role="tab" aria-selected="false" data-view="planner">Study Planner</button>
  </nav>
</header>

<main id="app">
  <section id="view-overview" class="view active"></section>
  <section id="view-qbank" class="view"></section>
  <section id="view-progress" class="view"></section>
  <section id="view-tests" class="view"></section>
  <section id="view-hy" class="view"></section>
  <section id="view-videos" class="view"></section>
  <section id="view-planner" class="view"></section>
  <!-- entity pages (NOT tabs): routed via goSubject/goPlatform/goFaculty -->
  <section id="view-subject" class="view"></section>
  <section id="view-platform" class="view"></section>
  <section id="view-faculty" class="view"></section>
</main>

<footer class="foot">
  <span>Local-first · your ticks &amp; scores save on this device · <b>⌘K</b> to search · press <b>1–7</b> to switch tabs · export anytime · server-ready (see <code>server/</code>)</span>
</footer>

<!-- bottom tab nav (mobile, ≤640px) -->
<nav class="botnav" id="botnav" aria-label="Sections">
  <button data-view="qbank" aria-label="QBank Tracker"><span class="bn-i">▤</span><span class="bn-l">QBank</span></button>
  <button data-view="progress" aria-label="Progress"><span class="bn-i">◔</span><span class="bn-l">Progress</span></button>
  <button data-view="tests" aria-label="Tests &amp; Scores"><span class="bn-i">✓</span><span class="bn-l">Tests</span></button>
  <button data-view="hy" aria-label="High-Yield"><span class="bn-i">★</span><span class="bn-l">Yield</span></button>
  <button data-view="videos" aria-label="Videos"><span class="bn-i">▷</span><span class="bn-l">Videos</span></button>
  <button data-view="planner" aria-label="Study Planner"><span class="bn-i">▦</span><span class="bn-l">Plan</span></button>
</nav>

<!-- detail drawer / bottom-sheet -->
<div class="drawer-scrim" id="drawerScrim"></div>
<aside class="drawer" id="drawer" aria-label="Topic detail" aria-hidden="true">
  <div class="drawer-head"><button class="xbtn" id="drawerClose" title="Close (Esc)" aria-label="Close">✕</button></div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- option bottom-sheet (mobile sort / filter) -->
<div class="sheet-scrim" id="sheetScrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Options" aria-hidden="true">
  <div class="sheet-head"><span class="sheet-title" id="sheetTitle"></span><button class="xbtn" id="sheetClose" aria-label="Close">✕</button></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<!-- command palette -->
<div class="palette" id="palette" role="dialog" aria-modal="true" aria-label="Command palette">
  <div class="pal-scrim" id="palScrim"></div>
  <div class="pal-box">
    <input class="pal-input" id="palInput" placeholder="Search topics, subjects, tests, actions…" autocomplete="off">
    <div class="pal-list" id="palList"></div>
    <div class="pal-foot"><span><b>↑↓</b> move</span><span><b>↵</b> open</span><span><b>esc</b> close</span></div>
  </div>
</div>

<script src="data.js"></script>
<script src="storage.js"></script>
<!-- module load order (all global scope, no bundler): core → ds → surfaces → entities → main -->
<script src="js/core.js"></script>
<script src="js/ds.js"></script>
<script src="js/surfaces/overview.js"></script>
<script src="js/surfaces/qbank.js"></script>
<script src="js/surfaces/progress.js"></script>
<script src="js/surfaces/tests.js"></script>
<script src="js/surfaces/hy.js"></script>
<script src="js/surfaces/videos.js"></script>
<script src="js/surfaces/planner.js"></script>
<script src="js/entities/subject.js"></script>
<script src="js/entities/platform.js"></script>
<script src="js/entities/faculty.js"></script>
<script src="js/main.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>
</body>
</html>
