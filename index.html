<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calvetra — Cross-platform exam almanac</title>
<meta name="description" content="Neutral cross-platform tracker for NEET PG / INI-CET / FMGE — Marrow, Cerebellum, DocTutorials in one place.">

<link rel="stylesheet" href="css/components.css">

<body>
<a class="skip" href="#app">Skip to content</a>
<header class="topbar">
  <div class="brand">
    <button class="logo" id="btnHome" aria-label="Overview (home)" title="Overview — home">C</button>
    <div class="brandtxt">
      <h1>Calvetra</h1>
      <p class="sub" id="subhead">Cross-platform exam almanac</p>
    </div>
    <span class="mob-title" id="mobTitle" aria-hidden="true">Overview</span>
    <div class="toolbar">
      <button class="tbtn key" id="btnSearch" title="Universal search (⌘K / Ctrl-K)"><span>⌘K</span> Search</button>
      <button class="tbtn" id="btnTheme" title="Day / evening edition">☀ Day</button>
      <button class="tbtn" id="btnBanks" title="My banks — the platforms you own (scopes plans)">▤ My banks</button>
      <button class="tbtn acct" id="btnAccount" title="Sign in to sync across devices">↪ Sign in</button>
      <button class="tbtn" id="btnExport" title="Download your tracking as JSON">⤓ Export</button>
      <button class="tbtn" id="btnImport" title="Load tracking from a JSON backup">⤒ Import</button>
      <button class="tbtn danger" id="btnReset" title="Clear your tracking">⟲ Reset</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
    <!-- compact mobile actions (≤640px) -->
    <button class="iconbtn mob-only" id="btnSearchM" aria-label="Search (⌘K)" title="Search">⌘K</button>
    <div class="overflow mob-only">
      <button class="iconbtn" id="btnOverflow" aria-label="More actions" aria-expanded="false" aria-haspopup="true" title="More">⋯</button>
      <div class="overflow-menu" id="overflowMenu" role="menu" hidden>
        <button role="menuitem" data-proxy="btnTheme" id="ovTheme">☀ Theme</button>
        <button role="menuitem" data-proxy="btnAccount" id="ovAccount">↪ Sign in</button>
        <button role="menuitem" data-proxy="btnBanks">▤ My banks</button>
        <button role="menuitem" data-proxy="btnExport">⤓ Export</button>
        <button role="menuitem" data-proxy="btnImport">⤒ Import</button>
        <button role="menuitem" data-proxy="btnReset" class="danger">⟲ Reset</button>
      </div>
    </div>
  </div>
  <!-- desktop tab bar: 5 nav GROUPS, rendered by renderNavChrome() (js/main.js) -->
  <nav class="tabs" id="tabs" role="tablist" aria-label="Sections"></nav>
</header>

<main id="app" tabindex="-1">
  <!-- top sub-nav lens switcher (shown for grouped tabs with ≥2 views); populated by renderSubnav() -->
  <div id="subnav" hidden></div>
  <section id="view-overview" class="view active"></section>
  <section id="view-qbank" class="view" role="tabpanel" aria-labelledby="tab-qbank" tabindex="0"></section>
  <section id="view-tracker" class="view" role="tabpanel" aria-labelledby="tab-tracker" tabindex="0"></section>
  <section id="view-progress" class="view" role="tabpanel" aria-labelledby="tab-progress" tabindex="0"></section>
  <section id="view-tests" class="view" role="tabpanel" aria-labelledby="tab-tests" tabindex="0"></section>
  <section id="view-hy" class="view" role="tabpanel" aria-labelledby="tab-hy" tabindex="0"></section>
  <section id="view-videos" class="view" role="tabpanel" aria-labelledby="tab-videos" tabindex="0"></section>
  <section id="view-planner" class="view" role="tabpanel" aria-labelledby="tab-planner" tabindex="0"></section>
  <!-- entity pages (NOT tabs): routed via goSubject/goPlatform/goFaculty -->
  <section id="view-subject" class="view"></section>
  <section id="view-platform" class="view"></section>
  <section id="view-faculty" class="view"></section>
</main>

<footer class="foot">
  <span>Local-first · your ticks &amp; scores save on this device · <b>⌘K</b> to search · press <b>1–5</b> to switch sections · export anytime · server-ready (see <code>server/</code>)</span>
</footer>

<!-- bottom tab nav (mobile, ≤640px): 5 nav GROUPS, rendered by renderNavChrome() (js/main.js) -->
<nav class="botnav" id="botnav" aria-label="Sections"></nav>

<!-- detail drawer / bottom-sheet -->
<div class="drawer-scrim" id="drawerScrim"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Topic detail" aria-hidden="true">
  <div class="drawer-head"><button class="xbtn" id="drawerClose" title="Close (Esc)" aria-label="Close">✕</button></div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- option bottom-sheet (mobile sort / filter) -->
<div class="sheet-scrim" id="sheetScrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Options" aria-hidden="true">
  <div class="sheet-head"><span class="sheet-title" id="sheetTitle"></span><button class="xbtn" id="sheetClose" aria-label="Close">✕</button></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<!-- command palette -->
<div class="palette" id="palette" role="dialog" aria-modal="true" aria-label="Command palette">
  <div class="pal-scrim" id="palScrim"></div>
  <div class="pal-box">
    <input class="pal-input" id="palInput" placeholder="Search topics, subjects, tests, actions…" autocomplete="off">
    <div class="pal-list" id="palList"></div>
    <div class="pal-foot"><span><b>↑↓</b> move</span><span><b>↵</b> open</span><span><b>esc</b> close</span></div>
  </div>
</div>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>
<script>
/* ── a11y wiring (index-scoped; layers ONTO main.js, never overrides it) ─────────
   Spec §2: roving tabindex + Arrow/Home/End on #tabs (tablist↔tabpanel already
   linked in markup), a shared focus trap for drawer/sheet/palette, and a skip-link
   that actually lands focus in #app. Pure progressive enhancement — every existing
   route, click handler, Esc-to-close, and focus-restore stays exactly as-is. */
(function () {
  "use strict";
  var tabs = document.getElementById("tabs");

  /* skip-link should land focus, not just scroll. #app has tabindex="-1"; suppress
     the stray focus ring (programmatic focus only, keyboard a11y unaffected). */
  var app = document.getElementById("app");
  if (app) app.style.outline = "none";

  /* ── roving tabindex on the desktop tablist ──
     keep the selected tab the only Tab-stop; main.js already toggles aria-selected
     inside show(), so we mirror tabindex off that via a MutationObserver (works no
     matter who calls show — click, keyboard, hash route, 1-7 hotkeys). */
  if (tabs) {
    var tabBtns = function () { return Array.prototype.slice.call(tabs.querySelectorAll(".tab")); };
    var syncRoving = function () {
      tabBtns().forEach(function (t) {
        t.setAttribute("tabindex", t.getAttribute("aria-selected") === "true" ? "0" : "-1");
      });
    };
    // initial sync, then keep in lockstep with aria-selected changes
    syncRoving();
    try {
      new MutationObserver(syncRoving).observe(tabs, {
        subtree: true, attributes: true, attributeFilter: ["aria-selected"]
      });
    } catch (e) { /* no MutationObserver: roving still seeds correctly on load */ }

    // Arrow/Home/End move focus AND activate (automatic-activation tablist pattern)
    tabs.addEventListener("keydown", function (e) {
      var k = e.key;
      if (k !== "ArrowLeft" && k !== "ArrowRight" && k !== "Home" && k !== "End") return;
      var list = tabBtns(); if (!list.length) return;
      var cur = list.indexOf(document.activeElement);
      if (cur < 0) cur = 0;
      var next = cur;
      if (k === "ArrowLeft")  next = (cur - 1 + list.length) % list.length;
      else if (k === "ArrowRight") next = (cur + 1) % list.length;
      else if (k === "Home") next = 0;
      else if (k === "End")  next = list.length - 1;
      e.preventDefault();
      var btn = list[next];
      // activate the focused tab — tabs are nav GROUPS now (data-group); legacy data-view kept as fallback
      if (btn.dataset.group && typeof showGroup === "function") showGroup(btn.dataset.group);
      else if (btn.dataset.view && typeof show === "function") show(btn.dataset.view);
      btn.focus(); // move focus (show() repaints aria-selected → observer fixes tabindex)
    });
  }

  /* ── shared focus trap for the three overlays (drawer / sheet / palette) ──
     they open by gaining the `.open` class; we observe that and trap Tab within the
     open overlay. Focus-IN and focus-RESTORE on close already live in main.js /
     qbank.js, so this is trap-only — we add nothing that fights existing behavior. */
  var FOCUSABLE = 'a[href],area[href],button:not([disabled]),input:not([disabled]),' +
                  'select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"]),' +
                  'audio[controls],video[controls],summary,[contenteditable="true"]';
  function visibleFocusables(container) {
    return Array.prototype.slice.call(container.querySelectorAll(FOCUSABLE)).filter(function (el) {
      return el.offsetParent !== null || el === document.activeElement;
    });
  }
  function trapTab(container, e) {
    if (e.key !== "Tab") return;
    var f = visibleFocusables(container);
    if (!f.length) { e.preventDefault(); return; }
    var first = f[0], last = f[f.length - 1], a = document.activeElement;
    if (e.shiftKey) {
      if (a === first || !container.contains(a)) { e.preventDefault(); last.focus(); }
    } else {
      if (a === last || !container.contains(a)) { e.preventDefault(); first.focus(); }
    }
  }
  function wireTrap(id) {
    var node = document.getElementById(id);
    if (!node) return;
    var handler = function (e) { trapTab(node, e); };
    var setOpen = function () {
      var open = node.classList.contains("open");
      if (open && !node.__trapOn) { node.__trapOn = true; document.addEventListener("keydown", handler, true); }
      else if (!open && node.__trapOn) { node.__trapOn = false; document.removeEventListener("keydown", handler, true); }
    };
    setOpen();
    try {
      new MutationObserver(setOpen).observe(node, { attributes: true, attributeFilter: ["class"] });
    } catch (e) { /* no MutationObserver: overlays still keyboard-operable, just untrapped */ }
  }
  ["drawer", "sheet", "palette"].forEach(wireTrap);
})();
</script>
</body>
</html>
